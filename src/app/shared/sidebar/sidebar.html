<div class="sidebar" [class.collapsed]="!(isOpen$ | async)">
  <div class="brand">
    <span class="material-symbols-outlined">terminal</span>
    <div class="brand-text">
      <p class="brand-title">dev.portfolio</p>
    </div>
    <button type="button" class="close-button" aria-label="Close navigation" (click)="sidebarStateService.close()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <nav class="nav-list" (click)="onNavClick()">
    <a routerLink="/inicio" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="nav-label">Inicio</span>
    </a>
    <a routerLink="/projetos" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">folder</span>
      <span class="nav-label">Projetos</span>
    </a>
    <a routerLink="/sobre" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">person</span>
      <span class="nav-label">Sobre</span>
    </a>
    <a routerLink="/contato" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">mail</span>
      <span class="nav-label">Contato</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="status-dot"></span>
    <span class="footer-label">System Online</span>
  </div>
</div>
