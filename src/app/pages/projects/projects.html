<section class="projects-shell">
  <div class="page-header">
    <p class="eyebrow">// projects</p>
    <h1 >Sistemas que eu desenvolvi</h1>
  </div>

  <div class="projects-grid">
    @for (card of project; track card.id) {
      <article class="project-card">
        <div class="project-card-top">
          <p class="project-title">{{ card.title }}
            @if (card.github) {
              <a
                [href]="card.github"
                target="_blank"
                rel="noopener noreferrer"
                class="github-link"
                aria-label="Abrir projeto no GitHub"
              >
                <img src="github.svg"alt="GitHub" class="icon">
              </a>
            }
          </p>
          <p class="project-problem">{{ card.problem }}</p>
        </div>

        <div class="project-tags">
          @for (tech of card.stack; track tech) {
            <span class="chip">{{ tech }}</span>
          }
        </div>

        <p class="project-feature">{{ card.feature }}</p>


      </article>
    }
  </div>
</section>
